    const tabs = document.getElementById('tabs');
    const panels = document.getElementById('panels');

    function letter(i) { return String.fromCharCode(65 + i); }

    function render() {
      tabs.innerHTML = variants.map((v, i) => `<button class="tab ${i === 0 ? 'active' : ''}" onclick="openVariant(${i})">${v.title}</button>`).join('');
      panels.innerHTML = variants.map((v, vi) => `
        <section class="panel ${vi === 0 ? 'active' : ''}" data-panel="${vi}">
          <div class="panel-head">
            <div>
              <h2>${v.title}</h2>
              <p>Көп жауапты тест</p>
            </div>
            <span class="badge">${v.questions.length} сұрақ</span>
          </div>
          <div class="questions">
            ${v.questions.map((q, qi) => `
              <div class="question" data-v="${vi}" data-q="${qi}">
                <div class="q-title">
                  ${qi + 1}. ${q.text}
                  <br><span class="note">${q.correct.length > 1 ? q.correct.length + ' дұрыс жауап' : '1 дұрыс жауап'}</span>
                </div>
                <div class="options">
                  ${q.options.map((opt, oi) => `
                    <label class="option" data-option="${oi}">
                      <input type="checkbox" value="${oi}">
                      <span>${letter(oi)}) ${opt}</span>
                    </label>
                  `).join('')}
                </div>
                <div class="answer">
                  <p><strong>Дұрыс жауап:</strong> ${q.correct.map(i => `${letter(i)}) ${q.options[i]}`).join('; ')}</p>
                  <p><strong>Түсіндірме:</strong> ${q.explanation}</p>
                </div>
              </div>
            `).join('')}
          </div>
          <div class="actions">
            <button class="btn btn-primary" onclick="showResult(${vi})">Нәтижені көрсету</button>
            <button class="btn btn-secondary" onclick="resetVariant(${vi})">Қайта тапсыру</button>
          </div>
          <div class="result" id="result-${vi}"></div>
        </section>
      `).join('');
    }

    function openVariant(index) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
      document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === index));
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function arraysEqual(a, b) {
      if (a.length !== b.length) return false;
      const x = [...a].sort((m,n)=>m-n);
      const y = [...b].sort((m,n)=>m-n);
      return x.every((val, i) => val === y[i]);
    }

    function showResult(vi) {
      const v = variants[vi];
      let score = 0;
      v.questions.forEach((q, qi) => {
        const qEl = document.querySelector(`.question[data-v="${vi}"][data-q="${qi}"]`);
        const selected = [...qEl.querySelectorAll('input:checked')].map(input => Number(input.value));
        const optionEls = qEl.querySelectorAll('.option');
        optionEls.forEach(el => el.classList.remove('correct', 'wrong', 'checked-correct'));
        q.correct.forEach(i => optionEls[i]?.classList.add('correct'));
        selected.forEach(i => { if (!q.correct.includes(i)) optionEls[i]?.classList.add('wrong'); else optionEls[i]?.classList.add('checked-correct'); });
        if (arraysEqual(selected, q.correct)) score++;
        qEl.querySelector('.answer').classList.add('show');
      });
      const result = document.getElementById(`result-${vi}`);
      result.classList.add('show');
      result.innerHTML = `Сіздің нәтижеңіз: ${score}/${v.questions.length}<br><span style="font-size:15px;font-weight:700">Дұрыс жауаптар жасыл түспен, қате таңдалған жауаптар қызыл түспен белгіленді.</span>`;
      result.scrollIntoView({behavior:'smooth', block:'center'});
    }

    function resetVariant(vi) {
      const panel = document.querySelector(`.panel[data-panel="${vi}"]`);
      panel.querySelectorAll('input').forEach(input => input.checked = false);
      panel.querySelectorAll('.option').forEach(el => el.classList.remove('correct', 'wrong', 'checked-correct'));
      panel.querySelectorAll('.answer').forEach(el => el.classList.remove('show'));
      const result = document.getElementById(`result-${vi}`);
      result.classList.remove('show');
      result.textContent = '';
      window.scrollTo({top: 0, behavior:'smooth'});
    }

    render();
  </script>
